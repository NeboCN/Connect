<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка защищенного соединения</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background: #f4f5f7; 
            color: #1c1c1e; 
            padding: 20px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .container { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 24px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.06); 
            max-width: 400px; 
            margin: 0 auto; 
            width: 100%; 
            box-sizing: border-box; 
        }
        h2 { margin-top: 0; font-size: 22px; margin-bottom: 25px; font-weight: 700; }
        
        /* Стили для воронки (Стрелки и текст) */
        .arrow-down { font-size: 24px; margin: 10px 0; color: #c7c7cc; }
        .help-text { color: #8e8e93; font-size: 13px; margin: 0 0 10px 0; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        
        #funnel-block, #error-block { display: none; }
        
        /* Архитектура кнопок */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px 20px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 600; 
            text-decoration: none; 
            cursor: pointer; 
            box-sizing: border-box; 
            transition: transform 0.1s, opacity 0.2s; 
            border: none;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        
        /* Красные кнопки для настроек Happ */
        .btn-red { background: #FF2D55; color: white; box-shadow: 0 4px 15px rgba(255, 45, 85, 0.3); }
        /* Синяя кнопка для возврата в ТГ */
        .btn-blue { background: #007aff; color: white; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }

        /* Консервация: скрываем старые блоки, но не удаляем из DOM */
        #archived-apps { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Настройка защищенного соединения</h2>
        
        <div id="error-block"><p style="color: #ff3b30;">Ошибка: Ссылка на профиль не найдена.</p></div>
        
        <div id="funnel-block">
            <a id="step1-happ" class="btn btn-red" href="#" onclick="silentCopy()">1 шаг. Настройка подключения в клиенте</a>
            
            <div class="arrow-down">⬇️</div>
            <p class="help-text">после подключения вернитесь обратно</p>
            <div class="arrow-down">⬇️</div>
            <a id="step2-routing" class="btn btn-red" href="#">2 шаг. Настройка конфигурации в клиенте</a>
            
            <div class="arrow-down">⬇️</div>
            <a href="tg://" class="btn btn-blue" onclick="setTimeout(() => window.close(), 100);">3 шаг. Возврат в бот для завершения</a>
        </div>

        <div id="archived-apps">
            <a id="link-v2box" href="#">V2Box Hidden</a>
            <a id="link-hiddify" href="#">Hiddify Hidden</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const subUrl = urlParams.get('sub');
        const name = urlParams.get('name') || 'Туннель';
        
        if (!subUrl) {
            document.getElementById('error-block').style.display = 'block';
        } else {
            // Показываем воронку
            document.getElementById('funnel-block').style.display = 'block';

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

            // 1. КОНСЕРВАЦИЯ V2BOX И HIDDIFY (Кодируем и сохраняем ссылки)
            const encodedUrl = encodeURIComponent(subUrl);
            const encodedName = encodeURIComponent(name);
            document.getElementById('link-v2box').href = "v2box://install-sub?url=" + encodedUrl + "&name=" + encodedName;
            document.getElementById('link-hiddify').href = "hiddify://install-config?url=" + encodedUrl + "&name=" + encodedName;
            
            // 2. ЖЕЛЕЗОБЕТОННАЯ ЛОГИКА HAPP (Шаг 1 - Подписка)
            const happLink = "happ://add/" + subUrl;

            const routingAndroid = "happ://routing/add/eyJOYW1lIjoiUVVJQy1ETlMtT25seSIsIlJvdXRlT3JkZXIiOiJCbG9ja1Byb3h5IiwiRG9tYWluU3RyYXRlZ3kiOiJJUElmTm9uTWF0Y2giLCJETlMiOnsiUmVtb3RlIjp7IlR5cGUiOiJEb0giLCJEb21haW4iOiJodHRwczovL2Rucy5nb29nbGUvZG5zLXF1ZXJ5IiwiSVAiOiI4LjguOC44In0sIkRvbWVzdGljIjp7IlR5cGUiOiJEb1UiLCJJUCI6Ijc3Ljg4LjguOCJ9fSwiUnVsZXMiOnsiQmxvY2tQb3J0IjpbIjQ0My91ZHAiXX19";

        }

        // Тихое копирование для подстраховки на 1-м шаге

</html>
