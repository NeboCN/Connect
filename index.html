<script>
    const urlParams = new URLSearchParams(window.location.search);
    const subUrl = urlParams.get('sub');
    const name = urlParams.get('name') || 'NeboVPN';
    let currentDeepLink = "";
    
    if (!subUrl) {
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('error-block').style.display = 'block';
    } else {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            document.getElementById('ios-block').style.display = 'block';
        } else if (/android/i.test(userAgent)) {
            document.getElementById('android-block').style.display = 'block';
        } else {
            document.getElementById('pc-block').style.display = 'block';
        }
    }

    function connectApp(client) {
        if (!subUrl) return;

        const encodedUrl = encodeURIComponent(subUrl);
        const encodedName = encodeURIComponent(name);
        let appName = ""; 
        let instructionHtml = "";

        if (client === 'v2box') {
            currentDeepLink = "v2box://install-sub?url=" + encodedUrl + "&name=" + encodedName;
            appName = "V2Box";
        } else if (client === 'happ') {
            // Главный стандарт для ядер Xray: install-config
            currentDeepLink = "happ://install-config?url=" + encodedUrl + "&name=" + encodedName;
            appName = "Happ";
        } else if (client === 'hiddify') {
            currentDeepLink = "hiddify://install-config?url=" + encodedUrl + "&name=" + encodedName;
            appName = "Hiddify";
        }

        instructionHtml = "✅ Подписка должна добавиться <b>автоматически</b>!<br><br>Если магия не сработала, мы 100% надежно скопировали ваш ключ. Просто нажмите <b>«Из Буфера»</b> или плюсик в приложении.";
        
        document.getElementById('modalAppName').innerText = appName;
        document.getElementById('modalInstruction').innerHTML = instructionHtml;

        // БРОНЕБОЙНОЕ КОПИРОВАНИЕ:
        // Сначала синхронно копируем через старый метод (работает везде)
        const tempInput = document.createElement("input");
        tempInput.value = subUrl;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);

        // Затем показываем окно (на случай если юзер вернется)
        document.getElementById('instructionOverlay').style.display = 'flex';
        
        // И только потом совершаем переход, чтобы браузер не убил процесс!
        setTimeout(() => {
            window.location.href = currentDeepLink;
        }, 300); // Крошечная пауза в 0.3 секунды спасает буфер обмена
    }

    function proceedToApp() {
        document.getElementById('instructionOverlay').style.display = 'none';
        window.location.href = currentDeepLink;
    }

    function copyOnly() {
        if (!subUrl) return;
        const tempInput = document.createElement("input");
        tempInput.value = subUrl;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        
        const btn = document.getElementById('copyBtn');
        btn.innerText = "✅ Скопировано";
        const toast = document.getElementById('toast');
        toast.style.bottom = "30px";
        setTimeout(() => { toast.style.bottom = "-50px"; }, 2500);
        setTimeout(() => btn.innerText = "📋 Скопировать ссылку", 2000);
    }
</script>
