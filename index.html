<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автонастройка туннеля</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; text-align: center; background: #f4f5f7; color: #1c1c1e; padding: 20px; margin: 0; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 22px; margin-bottom: 10px; }
        p { color: #8e8e93; font-size: 15px; margin-bottom: 25px; line-height: 1.4; }
        
        #ios-block, #android-block, #pc-block, #error-block { display: none; }
        
        .btn { display: block; width: 100%; padding: 14px 20px; margin-bottom: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; text-decoration: none; color: white; border: none; cursor: pointer; box-sizing: border-box; transition: opacity 0.2s; text-align: center; }
        .btn:active { opacity: 0.8; }
        .btn-v2box { background: #007aff; }
        .btn-happ { background: #FF2D55; }
        .btn-hiddify { background: #5856D6; }
        .btn-v2tune { background: #FF9500; } 
        .btn-copy { background: #34C759; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Автонастройка</h2>
        <p id="subtitle">Выберите установленное приложение</p>
        
        <div id="error-block"><p style="color: #ff3b30;">Ошибка: Ссылка не передана.</p></div>
        
        <div id="ios-block">
            <a id="btn-v2tune" class="btn btn-v2tune" href="#">🍏 Настроить в V2 Tune</a>
            <a id="btn-happ-ios" class="btn btn-happ" href="#">🍏 Настроить в Happ</a>
            <a id="btn-v2box" class="btn btn-v2box" href="#">🍏 Настроить в V2Box</a>
        </div>
        
        <div id="android-block">
            <a id="btn-happ-and" class="btn btn-happ" href="#">🤖 Настроить в Happ</a>
            <a id="btn-hiddify" class="btn btn-hiddify" href="#">🤖 Настроить в Hiddify</a>
        </div>
        
        <div id="pc-block">
            <button class="btn btn-copy" id="copyBtn" onclick="copyOnly()">📋 Скопировать ключ</button>
            <p style="margin-top: 15px; font-size: 13px;">Вставьте этот ключ в приложение на вашем устройстве.</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const rawSubUrl = urlParams.get('sub');
        const vpnName = "NeboVPN";

        if (!rawSubUrl) {
            document.getElementById('subtitle').style.display = 'none';
            document.getElementById('error-block').style.display = 'block';
        } else {
            const encodedUrl = encodeURIComponent(rawSubUrl);
            const encodedName = encodeURIComponent(vpnName);

            // Системные схемы
            const happLink = "happ://install-config?url=" + encodedUrl + "&name=" + encodedName;
            const hiddifyLink = "hiddify://install-config?url=" + encodedUrl + "&name=" + encodedName;
            const v2boxLink = "v2box://install-sub?url=" + encodedUrl + "&name=" + encodedName;
            
            // Прямой протокол импорта V2RayTun (из их документации)
            const v2TuneLink = "v2raytun://import/" + rawSubUrl;

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                document.getElementById('ios-block').style.display = 'block';
                
                document.getElementById('btn-v2tune').onclick = (e) => connectApp(e, v2TuneLink, rawSubUrl);
                document.getElementById('btn-happ-ios').onclick = (e) => connectApp(e, happLink, rawSubUrl);
                document.getElementById('btn-v2box').onclick = (e) => connectApp(e, v2boxLink, rawSubUrl);
            } else if (/android/i.test(userAgent)) {
                document.getElementById('android-block').style.display = 'block';
                
                document.getElementById('btn-happ-and').onclick = (e) => connectApp(e, happLink, rawSubUrl);
                document.getElementById('btn-hiddify').onclick = (e) => connectApp(e, hiddifyLink, rawSubUrl);
            } else {
                document.getElementById('pc-block').style.display = 'block';
            }
        }

        // БРОНЕБОЙНАЯ ФУНКЦИЯ КОПИРОВАНИЯ И ПЕРЕХОДА
        function connectApp(event, appScheme, rawUrl) {
            // 1. Блокируем мгновенный переход
            event.preventDefault();

            // 2. Создаем специальное скрытое поле (Хак для iOS)
            const textArea = document.createElement("textarea");
            textArea.value = rawUrl;
            textArea.style.position = "fixed";
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            
            // 3. Выделяем и копируем синхронно
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
            } catch (err) {
                console.error('Ошибка копирования', err);
            }
            document.body.removeChild(textArea);

            // 4. Ждем 200 мс, чтобы iOS успела записать буфер, и только потом открываем приложение!
            setTimeout(() => {
                window.location.href = appScheme;
            }, 200);
        }

        // Обычная кнопка копирования
        function copyOnly() {
            if (!rawSubUrl) return;
            const textArea = document.createElement("textarea");
            textArea.value = rawSubUrl;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const btn = document.getElementById('copyBtn');
            btn.innerText = "✅ Скопировано";
            setTimeout(() => btn.innerText = "📋 Скопировать ключ", 2000);
        }
    </script>
</body>
</html>
