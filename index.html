<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Настройка клиента</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; background: #f4f5f7; color: #1c1c1e; padding: 20px; margin: 0; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 20px; margin-bottom: 5px; color: #1c1c1e; }
        
        #mobile-block, #pc-block, #error-block { display: none; }
        
        .arrow { font-size: 24px; margin: 10px 0; color: #8e8e93; }
        .instruction-text { color: #8e8e93; font-size: 14px; margin: 0; font-weight: 500; }
        
        .btn { display: block; width: 100%; padding: 16px 10px; border-radius: 14px; font-size: 15px; font-weight: 600; text-decoration: none; color: white; border: none; cursor: pointer; box-sizing: border-box; transition: transform 0.1s, opacity 0.2s; white-space: normal; word-wrap: break-word; line-height: 1.3;}
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        
        .btn-happ { background: #FF2D55; }
        .btn-routing { background: #2c2c2e; } /* Строгий темный цвет для второго шага */
        .btn-copy { background: #34C759; }
        
        .toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; transition: bottom 0.3s ease; z-index: 2000; }
    </style>
</head>

        <h2>Настройка защищенного соединения клиента</h2>

            <div class="arrow">⬇️</div>
            
            <a id="step2-btn" class="btn btn-routing" href="#" onclick="silentCopy()">2 шаг Настройка конфигурации клиента</a>
            
            <div class="arrow">⬇️</div>
            <p class="instruction-text">вернитесь в бота для завершения</p>
        </div>

        <div id="pc-block">
            <button class="btn btn-copy" id="copyBtn" onclick="copyOnly()">📋 Скопировать ссылку</button>
            <p style="margin-top: 15px; font-size: 13px; color:#8e8e93;">Откройте клиент на ПК и вставьте ссылку.</p>
        </div>
    </div>

    <div class="toast" id="toast">Ссылка скопирована в буфер!</div>

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            const isAndroid = /android/i.test(userAgent);

            // Показываем мобильный интерфейс для всех телефонов

                document.getElementById('mobile-block').style.display = 'block';

        // Фоновое копирование (страховка)
        function silentCopy() {
            if (subUrl) { navigator.clipboard.writeText(subUrl).catch(e => {}); }
        }

        // Для ПК
        function copyOnly() {
            if (!subUrl) return;
            navigator.clipboard.writeText(subUrl).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "✅ Скопировано";
                const toast = document.getElementById('toast');
                toast.style.bottom = "30px";
                setTimeout(() => { toast.style.bottom = "-50px"; }, 2500);

</body>
</html>
